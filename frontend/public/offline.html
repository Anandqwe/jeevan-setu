<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeevan-Setu - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #fef2f2;
      color: #991b1b;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #7f1d1d; margin-bottom: 1rem; }
    .retry-btn {
      padding: 0.75rem 2rem;
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    .retry-btn:hover { background: #b91c1c; }
    .emergency-note {
      margin-top: 2rem;
      padding: 1rem;
      background: #fee2e2;
      border-radius: 8px;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🚑</div>
    <h1>You're Offline</h1>
    <p>Jeevan-Setu requires an internet connection for real-time emergency coordination.</p>
    <button class="retry-btn" onclick="window.location.reload()">Retry Connection</button>
    <div class="emergency-note">
      <strong>Emergency?</strong> Call <strong>112</strong> (India Emergency) or <strong>102</strong> (Ambulance) directly.
    </div>
  </div>
</body>
</html>
